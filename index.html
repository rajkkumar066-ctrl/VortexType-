    <style>
        /* Modern Glassmorphism Theme */
        :root {
            --bg-color: #0f1016;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f1f1f1;
            --text-muted: #888c96;
            --accent-color: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --correct-color: #10b981;
            --incorrect-color: #ef4444;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 25%);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 70px; /* Space for Sticky Footer Ad */
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Navbar */
        nav {
            position: sticky; top: 0; z-index: 1000; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 0 0 16px 16px; border-top: none;
        }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; background: linear-gradient(90deg, #fff, var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: 0.3s; cursor: pointer; }
        .nav-links a:hover, .nav-links a.active { color: var(--text-main); }
        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 5px; }
        .hamburger div { width: 25px; height: 3px; background-color: var(--text-main); border-radius: 3px; }

        /* Container & Layout */
        .container { max-width: 1000px; margin: 0 auto; width: 95%; flex-grow: 1; padding-top: 2rem; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Typography & Content Sections */
        h1, h2, h3 { color: var(--text-main); margin-bottom: 1rem; }
        p { color: var(--text-muted); margin-bottom: 1.2rem; }
        .content-section { padding: 2rem; margin-bottom: 2rem; }

        /* Buttons & Inputs */
        .btn { background: var(--accent-color); color: #fff; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-family: var(--font-main); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.7); }
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); box-shadow: none; }
        .btn-outline:hover { background: var(--glass-bg); }
        .btn-small { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
        
        .custom-input { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: #fff; padding: 0.5rem; border-radius: 6px; font-family: var(--font-main); outline: none; text-align: center; width: 80px; }
        .custom-input:focus { border-color: var(--accent-color); }
        .form-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: #fff; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-family: var(--font-main); }

        /* Tool Settings */
        .settings-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1rem; padding: 1rem; border-radius: 12px; }
        .settings-group { display: flex; gap: 0.5rem; align-items: center; }
        .settings-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-right: 0.5rem; }
        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-upload-wrapper input[type="file"] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        #ocr-status { font-size: 0.85rem; color: var(--correct-color); display: none; margin-top: 0.5rem; text-align: center; font-weight: bold; }

        /* Typing Area */
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 1rem; padding: 1rem; border-radius: 12px; }
        .stat-box { text-align: center; }
        .stat-val { font-size: 2.2rem; font-weight: 800; color: var(--accent-color); font-family: var(--font-mono); }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .progress-container { width: 100%; height: 6px; background: var(--glass-bg); border-radius: 3px; margin-bottom: 1.5rem; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.3s, background-color 0.5s; background: var(--text-muted); }
        .progress-bar.tier-good { background: var(--correct-color); box-shadow: 0 0 10px var(--correct-color); }

        .text-display { font-family: var(--font-mono); font-size: 1.4rem; line-height: 1.8; color: var(--text-muted); user-select: none; position: relative; cursor: text; padding: 1rem; }
        .text-display span { transition: color 0.1s; border-radius: 3px; }
        .text-display span.correct { color: var(--correct-color); }
        .text-display span.incorrect { color: var(--incorrect-color); background: rgba(239, 68, 68, 0.2); }
        .text-display span.active { color: var(--text-main); position: relative; }
        .text-display span.active::before { content: ""; position: absolute; left: 0; top: 10%; bottom: 10%; width: 2px; background-color: var(--accent-color); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #hidden-input { position: absolute; opacity: 0; z-index: -999; top: 0; left: 0; }
        .controls { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; }

        /* Articles & Blog Grid */
        .article-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .article-card { padding: 1.5rem; border-radius: 12px; }
        .article-card h3 { color: var(--accent-color); margin-bottom: 1rem; font-size: 1.2rem; }
        .article-card p { font-size: 0.95rem; color: #ccc; line-height: 1.7; text-align: justify; }

        /* Footer (AdSense Requirement) */
        footer { padding: 2rem; margin-top: 3rem; text-align: center; border-radius: 16px 16px 0 0; border-bottom: none; }
        .footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 1rem; }
        .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; cursor: pointer; transition: 0.3s; }
        .footer-links a:hover { color: var(--accent-color); }

        /* Cookie Banner */
        #cookie-banner { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; background: #1a1b26; border: 1px solid var(--accent-color); padding: 1rem; border-radius: 12px; z-index: 10000; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #cookie-banner p { margin: 0; font-size: 0.85rem; color: #ccc; }

        /* Ad Slots */
        .ad-container { display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.3); border: 1px dashed rgba(255, 255, 255, 0.1); position: relative; margin: 1.5rem auto; }
        .ad-container::before { content: "Advertisement"; position: absolute; top: -16px; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .ad-slot-a { width: 728px; height: 90px; }
        .ad-slot-b { width: 300px; height: 250px; }
        .ad-slot-c { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: var(--bg-color); border-top: 1px solid var(--glass-border); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .ad-slot-c .ad-inner { width: 320px; height: 50px; border: 1px dashed rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; position:relative; }

        /* Mobile */
        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: rgba(15, 16, 22, 0.98); padding: 1.5rem; border-bottom: 1px solid var(--glass-border); }
            .nav-links.active-menu { display: flex; }
            .hamburger { display: flex; }
            .ad-slot-a { width: 320px; height: 50px; }
            .settings-bar { flex-direction: column; align-items: flex-start; }
            .stat-val { font-size: 1.5rem; }
            #cookie-banner { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const SAMPLES = {
            en: "Digital transformation is changing the way we work. Speed and accuracy in data entry are essential for modern careers. VortexType provides the perfect platform to refine these skills.",
            hi: "सफलता का कोई संक्षिप्त मार्ग नहीं होता। निरंतर अभ्यास और सही तकनीक से ही हम अपने लक्ष्यों को प्राप्त कर सकते हैं।"
        };

        let currentText = "";
        let charIndex = 0;
        let errors = 0;
        let isRunning = false;
        let timer = null;
        let secondsLeft = 0;
        let pageHistory = ['home'];

        const displayEl = document.getElementById('text-display');
        const inputEl = document.getElementById('typing-input');
        const startBtn = document.getElementById('start-btn');

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.replace('active-page', 'hidden-page'));
            document.getElementById(id).classList.replace('hidden-page', 'active-page');
            
            if (id !== 'home') {
                pageHistory.push(id);
                document.getElementById('global-back').classList.remove('hidden');
            } else {
                pageHistory = ['home'];
                document.getElementById('global-back').classList.add('hidden');
            }
            if (id === 'tool') initTest();
            window.scrollTo(0, 0);
        }

        function goBack() {
            if (pageHistory.length > 1) {
                pageHistory.pop();
                showPage(pageHistory.pop());
            }
        }

        function initTest() {
            clearInterval(timer);
            isRunning = false;
            charIndex = 0;
            errors = 0;
            
            const lang = document.getElementById('lang-select').value;
            if (!document.getElementById('file-upload').value) {
                currentText = SAMPLES[lang];
            }

            displayEl.innerHTML = currentText.split('').map((c, i) => `<span id="c-${i}" class="char-default">${c}</span>`).join('');
            if(document.getElementById(`c-0`)) document.getElementById(`c-0`).classList.add('char-current');
            
            inputEl.value = "";
            inputEl.disabled = true;
            startBtn.innerText = "Start Test";
            startBtn.className = "flex-1 bg-indigo-600 hover:bg-indigo-700 py-5 rounded-2xl font-bold text-xl transition";
            
            document.getElementById('stat-wpm').innerText = "0";
            document.getElementById('stat-err').innerText = "0";
            document.getElementById('stat-acc').innerText = "100%";
            
            secondsLeft = (parseInt(document.getElementById('timer-config').value) || 1) * 60;
            updateTimerUI();
        }

        function updateTimerUI() {
            const m = Math.floor(secondsLeft / 60);
            const s = secondsLeft % 60;
            document.getElementById('stat-time').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function startTest() {
            if (isRunning) return;
            isRunning = true;
            inputEl.disabled = false;
            inputEl.focus();
            startBtn.innerText = "Running...";
            startBtn.className = "flex-1 bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-bold text-xl transition";

            timer = setInterval(() => {
                secondsLeft--;
                updateTimerUI();
                if (secondsLeft <= 0) endTest();
                else calculateStats();
            }, 1000);
        }

        inputEl.addEventListener('input', (e) => {
            if (!isRunning) return;
            const typed = e.target.value;
            errors = 0;
            charIndex = typed.length;

            for (let i = 0; i < currentText.length; i++) {
                const span = document.getElementById(`c-${i}`);
                span.className = 'char-default';
                if (i < charIndex) {
                    if (typed[i] === currentText[i]) span.classList.add('char-correct');
                    else { span.classList.add('char-incorrect'); errors++; }
                } else if (i === charIndex) {
                    span.classList.add('char-current');
                }
            }
            calculateStats();
            if (charIndex >= currentText.length) endTest();
        });

        function calculateStats() {
            const totalSecs = (parseInt(document.getElementById('timer-config').value) * 60);
            const passed = totalSecs - secondsLeft;
            if (passed <= 0) return;
            const wpm = Math.round((charIndex / 5) / (passed / 60)) || 0;
            const acc = charIndex > 0 ? Math.round(((charIndex - errors) / charIndex) * 100) : 100;
            document.getElementById('stat-wpm').innerText = wpm;
            document.getElementById('stat-err').innerText = errors;
            document.getElementById('stat-acc').innerText = acc + "%";
        }

        function endTest() {
            clearInterval(timer);
            isRunning = false;
            inputEl.disabled = true;
            initTest();
        }

        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const status = document.getElementById('upload-status');
            if (!file) return;
            status.innerText = "Processing...";
            
            // CLEANING HELPER (Ensures OCR accuracy)
            const cleanText = (raw) => {
                return raw.replace(/[^a-zA-Z0-9\s.,!?;:()।ािीुूृेैोौंःँ]/g, '') // Remove artifacts but keep Hindi/English essentials
                          .replace(/\r?\n|\r/g, " ") // Remove line breaks
                          .replace(/\s+/g, " ") // Remove extra spaces
                          .trim();
            };

            try {
                if (file.type.includes('image')) {
                    const res = await Tesseract.recognize(file, document.getElementById('lang-select').value === 'hi' ? 'hin' : 'eng');
                    currentText = cleanText(res.data.text);
                } else {
                    const reader = new FileReader();
                    reader.onload = async function() {
                        const pdf = await pdfjsLib.getDocument({data: new Uint8Array(this.result)}).promise;
                        const page = await pdf.getPage(1);
                        const content = await page.getTextContent();
                        const rawContent = content.items.map(i => i.str).join(' ');
                        currentText = cleanText(rawContent);
                        initTest();
                    };
                    reader.readAsArrayBuffer(file);
                    return;
                }
                status.innerText = "Success!";
                initTest();
            } catch (err) { status.innerText = "Error."; }
        });

        window.onload = initTest;

    </script>

    <script>
function endTest() {
    clearInterval(timer);
    isRunning = false;
    inputEl.disabled = true;

    const wpm = document.getElementById('stat-wpm').innerText;
    const acc = document.getElementById('stat-acc').innerText;

function showPopup(wpm, acc, err){
